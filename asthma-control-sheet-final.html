<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>患者様についてのお伺い</title>
<style>
  :root{
    --bg:#F4F6FB; --bg-top:#F9FBFF; --card:#FFFFFF;
    --ink:#0F172A; --ink-soft:#334155; --muted:#64748B;
    --line:#E7EBF1; --track:#EEF1F7; --track-hover:#E3E8F1;
    --primary:#4F46E5; --primary-press:#4338CA; --primary-soft:#EEF0FE;
    /* 重症度ヒートマップ（§12）：軽→重 */
    --sev1:#15803D; --sev2:#CA8A04; --sev3:#EA580C; --sev4:#DC2626;
    --radius:18px;
    --shadow-sm:0 1px 2px rgba(15,23,42,.06);
    --shadow-md:0 12px 32px -16px rgba(15,23,42,.28);
    --shadow-pop:0 8px 18px -8px rgba(79,70,229,.45);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; color:var(--ink);
    background:linear-gradient(180deg,var(--bg-top),var(--bg)) fixed, var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Meiryo","Segoe UI",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:flex; flex-direction:column; min-height:100vh;
  }

  /* ===== Top bar (glass) ===== */
  .topbar{
    flex:0 0 auto; position:sticky; top:0; z-index:5;
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding:0 20px; height:60px; color:var(--ink);
    background:rgba(255,255,255,.82); border-bottom:1px solid var(--line);
    -webkit-backdrop-filter:saturate(180%) blur(12px); backdrop-filter:saturate(180%) blur(12px);
  }
  .brand{display:flex; align-items:baseline; gap:10px; min-width:0; flex:1 1 auto; overflow:hidden;}
  .brand .title{font-size:17px; font-weight:700; letter-spacing:-.01em; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .brand .sub{font-size:11.5px; color:var(--muted); white-space:nowrap; flex:0 0 auto;}
  .controls{display:flex; align-items:center; gap:8px; flex:0 0 auto;}
  .counter{
    font-size:12.5px; font-weight:700; color:var(--ink-soft); background:var(--track);
    border:none; border-radius:999px; padding:7px 13px; white-space:nowrap; font-variant-numeric:tabular-nums;
    transition:background .15s ease, color .15s ease;
  }
  .counter.is-complete{background:var(--primary); color:#fff;}
  .tbtn{
    background:#fff; color:var(--ink-soft); border:1px solid var(--line);
    border-radius:11px; padding:8px 14px; font-size:13px; font-weight:600; font-family:inherit;
    cursor:pointer; white-space:nowrap; box-shadow:var(--shadow-sm);
    transition:background .15s ease, border-color .15s ease, transform .06s ease;
  }
  .tbtn:hover{background:#F8FAFC;}
  .tbtn:active{transform:translateY(1px);}
  .tbtn:focus-visible{outline:2px solid var(--primary); outline-offset:2px;}
  .edit.is-on{background:var(--primary); border-color:var(--primary); color:#fff; box-shadow:var(--shadow-pop);}
  .edit.is-on:hover{background:var(--primary-press);}

  /* ===== Edit hint ===== */
  .edit-hint{
    flex:0 0 auto; background:var(--primary-soft); color:#3730A3;
    border-bottom:1px solid #DDE0FB; font-size:12.5px; padding:10px 20px; line-height:1.45;
  }

  /* ===== Board ===== */
  .board{flex:1 1 auto; display:flex; flex-direction:column; gap:16px; padding:20px; width:100%; max-width:1200px; margin:0 auto;}
  .col{
    flex:0 0 auto; width:100%; min-width:0; background:var(--card);
    border:1px solid var(--line); border-radius:var(--radius);
    padding:22px; display:flex; flex-direction:column; box-shadow:var(--shadow-md);
  }
  .col-head{
    flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding-bottom:14px; margin-bottom:16px; border-bottom:1px solid var(--line);
  }
  .col-title{font-size:18px; font-weight:700; color:var(--ink); letter-spacing:-.01em; flex:1; min-width:0;}
  .col.accent .col-title{color:var(--primary);}
  .qs{flex:1 1 auto; display:flex; flex-direction:column; justify-content:flex-start; gap:18px; min-height:0;}
  .q-head{display:flex; align-items:center; justify-content:space-between; gap:6px; margin-bottom:8px;}
  .q .label{font-size:13px; font-weight:600; color:var(--muted); letter-spacing:.01em; min-width:0;}
  .opts{display:flex; gap:8px;}
  .opt{
    flex:1; min-width:0; display:flex; align-items:center; justify-content:center; text-align:center;
    min-height:46px; padding:6px 8px; border:none; border-radius:12px;
    background:var(--track); color:var(--ink-soft); font-family:inherit; font-size:13px; font-weight:600;
    line-height:1.18; font-variant-numeric:tabular-nums; cursor:pointer;
    box-shadow:inset 0 0 0 1px rgba(15,23,42,.03);
    transition:background .15s ease, color .15s ease, box-shadow .15s ease, transform .07s ease;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  }
  .opt:hover{background:var(--track-hover);}
  .opt:active{transform:translateY(1px) scale(.99);}
  .opt:focus-visible{outline:2px solid var(--primary); outline-offset:2px;}
  /* 選択状態：sev=0 はブランド色（インディゴ）、sev1..4 は重症度カラー */
  .opt.is-selected{background:var(--primary); color:#fff; font-weight:700; box-shadow:var(--shadow-pop);}
  .opt.is-selected[data-sev="1"]{background:var(--sev1); box-shadow:0 8px 18px -8px rgba(21,128,61,.5);}
  .opt.is-selected[data-sev="2"]{background:var(--sev2); box-shadow:0 8px 18px -8px rgba(202,138,4,.5);}
  .opt.is-selected[data-sev="3"]{background:var(--sev3); box-shadow:0 8px 18px -8px rgba(234,88,12,.5);}
  .opt.is-selected[data-sev="4"]{background:var(--sev4); box-shadow:0 8px 18px -8px rgba(220,38,38,.5);}

  /* ===== Editor chrome (hidden by default) ===== */
  .editor-only{display:none;}
  .q-tools{gap:4px; flex:0 0 auto;}
  .q-tools button, .col-del{
    width:28px; height:28px; padding:0; line-height:1; border:1px solid var(--line);
    background:#fff; color:var(--muted); border-radius:8px; font-size:12px; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; font-family:inherit; box-shadow:var(--shadow-sm);
  }
  .q-tools button:hover, .col-del:hover{background:#F8FAFC; color:var(--ink);}
  .t-del:hover, .col-del:hover{color:#DC2626; border-color:#FAC7C7;}
  .add-q{
    margin-top:14px; width:100%; border:1.5px dashed #CBD5E1; background:#fff; color:var(--muted);
    border-radius:12px; padding:10px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;
    transition:background .15s ease, border-color .15s ease, color .15s ease;
  }
  .add-q:hover{background:#F8FAFC; color:var(--ink); border-color:var(--primary);}
  .add-col{
    flex:0 0 auto; align-self:stretch; border:1.5px dashed #CBD5E1; background:transparent;
    color:var(--muted); border-radius:var(--radius); padding:16px; font-size:13px; font-weight:600;
    cursor:pointer; font-family:inherit; transition:background .15s ease, border-color .15s ease, color .15s ease;
  }
  .add-col:hover{background:#fff; color:var(--ink); border-color:var(--primary);}

  /* ===== Edit mode visibility ===== */
  body.editing .q-tools{display:inline-flex;}
  body.editing .col-del{display:inline-flex;}
  body.editing .topbar .editor-only{display:inline-flex;}
  body.editing .add-q{display:block;}
  body.editing .add-col{display:flex; align-items:center; justify-content:center;}
  body.editing .edit-hint{display:block;}
  body.editing .normal-only{display:none;}
  body.editing .label, body.editing .opt, body.editing .col-title{
    outline:1.5px dashed #C7D2FE; outline-offset:2px; border-radius:8px;
  }
  body.editing .opt{cursor:text;}
  body.editing{height:auto; min-height:100vh;}

  @media (prefers-reduced-motion: reduce){
    .opt,.tbtn,.counter{transition:none;}
    .opt:active,.tbtn:active{transform:none;}
  }

  /* 1列（縦積み）固定。狭い画面でも縦に並ぶ。 */
  @media (max-width: 560px){ .board{padding:14px;} .col{padding:18px 16px;} }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="title">患者様についてのお伺い</span>
    </div>
    <div class="controls">
      <span class="counter normal-only" id="counter">記入 0 / 0</span>
      <button class="tbtn reset normal-only" id="reset" type="button">リセット</button>
      <button class="tbtn save editor-only" id="save" type="button">保存（書き出し）</button>
      <button class="tbtn init editor-only" id="init" type="button">初期化</button>
      <button class="tbtn edit" id="editToggle" type="button">編集</button>
    </div>
  </header>

  <div class="edit-hint editor-only">
    編集モード：<b>↑↓</b> で移動・<b>✕</b> で削除・<b>文字をタップ</b>で書き換え・<b>＋</b> で追加。仕上がったら〔保存（書き出し）〕でファイルにして共有できます。
  </div>

  <main class="board" id="board"><!-- rendered by script --></main>

  <!-- §5-2 書き出し時に現在の構成（データモデル）をここへ焼き込む -->
  <script id="bakedModel" type="application/json"></script>

<script>
(function(){
  'use strict';

  // ===== 定数 =====
  // データモデルを JSON で保存。スキーマ変更時は SEED_VERSION を上げると
  // 旧バージョンの保存値は破棄され seed / 焼き込み構成にフォールバックする。
  const KEY = 'asthmaSheet_v2';
  const SEED_VERSION = 2;

  const board = document.getElementById('board');
  const counter = document.getElementById('counter');
  const editToggle = document.getElementById('editToggle');
  const saveBtn = document.getElementById('save');
  const initBtn = document.getElementById('init');
  const resetBtn = document.getElementById('reset');

  // ===== 初期データ（seed） =====
  // sev: 各選択肢の重症度（0=中立, 1=良好 … 4=不良）。is-selected 時に色付け（§12）。
  const seed = [
    { title:'重症度・コントロールと通院・くらしの負担', accent:false, qs:[
      { label:'年齢', options:['69歳以下','70歳以上'], sev:[0,0] },
      { label:'性別', options:['男性','女性'], sev:[0,0] },
      { label:'過去1年の増悪回数', options:['0回','1回','2回','3回以上'], sev:[1,2,3,4] },
      { label:'入院・救急受診', options:['なし','あり'], sev:[1,4] },
      { label:'経口ステロイド（OCS）', options:['なし','短期バースト','維持使用'], sev:[1,3,4] },
      { label:'血中好酸球数（/μL）', options:['<150','150–300','≥300','≥500'], sev:[1,2,3,4] },
      { label:'現在の治療', options:['中用量ICS','高用量+LABA','多剤でも不十分','バイオ製剤中'], sev:[0,0,0,0] },
      { label:'生物学的製剤', options:['なし','ヌーカラ','ファセンラ','テゼスパイア','デュピクセント'], sev:[0,0,0,0,0] },
      { label:'好酸球性副鼻腔炎・鼻茸', options:['なし','あり'], sev:[1,3] },
      { label:'通院頻度（可能・希望）', options:['毎月可','2–3か月毎','半年毎希望','困難'], sev:[1,2,3,4] },
      { label:'通院の距離・手段', options:['近い','やや遠い','遠方','要送迎・介助'], sev:[1,2,3,4] },
      { label:'仕事', options:['会社員','自営業','パート・主婦','無職'], sev:[0,0,0,0] },
      { label:'経済的な負担・不安', options:['なし','やや不安','強い','要・制度案内'], sev:[1,2,3,4] },
    ]},
  ];

  // ===== 状態（構造の唯一の真実）=====
  let model = [];

  function clone(x){ return JSON.parse(JSON.stringify(x)); }
  // §7注記：< を含む選択肢があるため必ずエスケープを通す
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  // ===== 描画（model → DOM）。HTML は常にここで生成し esc() を通す =====
  function optHTML(o, sev){
    return '<div class="opt" role="button" tabindex="0" aria-pressed="false" data-sev="'+(Number(sev)||0)+'">'+esc(o)+'</div>';
  }
  function qHTML(q){
    var sev = q.sev || [];
    var opts = q.options.map(function(o,i){ return optHTML(o, sev[i] != null ? sev[i] : 0); }).join('');
    return '<div class="q"><div class="q-head"><span class="label">'+esc(q.label)+'</span>'
      + '<span class="q-tools editor-only"><button class="t-up" type="button" title="上へ">↑</button>'
      + '<button class="t-down" type="button" title="下へ">↓</button>'
      + '<button class="t-del" type="button" title="削除">✕</button></span></div>'
      + '<div class="opts">'+opts+'</div></div>';
  }
  function colHTML(col){
    var qs = col.qs.map(qHTML).join('');
    return '<section class="col'+(col.accent?' accent':'')+'"><div class="col-head">'
      + '<span class="col-title">'+esc(col.title)+'</span>'
      + '<button class="col-del editor-only" type="button" title="列を削除">✕</button></div>'
      + '<div class="qs">'+qs+'</div>'
      + '<button class="add-q editor-only" type="button">＋ 項目を追加</button></section>';
  }
  const ADDCOL = '<button class="add-col editor-only" type="button">＋ 列を追加</button>';

  function render(){
    board.innerHTML = model.map(colHTML).join('') + ADDCOL;
    applyEditable();
    updateCounter();
  }

  // ===== 読み込み（§5 優先順位）=====
  //  1) localStorage の JSON（バージョン一致）
  //  2) 焼き込み済み構成 #bakedModel（書き出しファイル）
  //  3) seed
  function readBaked(){
    try{
      var el = document.getElementById('bakedModel');
      if(el && el.textContent.trim()){
        var p = JSON.parse(el.textContent);
        if(p && Array.isArray(p.cols)) return p.cols;
      }
    }catch(e){}
    return null;
  }
  function loadModel(){
    try{
      var raw = localStorage.getItem(KEY);
      if(raw){
        var p = JSON.parse(raw);
        if(p && p.v === SEED_VERSION && Array.isArray(p.cols)) return p.cols;
      }
    }catch(e){}
    var baked = readBaked();
    if(baked) return baked;
    return clone(seed);
  }
  function saveModel(){
    try{ localStorage.setItem(KEY, JSON.stringify({ v:SEED_VERSION, cols:model })); }catch(e){}
  }

  // ===== カウンター =====
  function updateCounter(){
    var groups = board.querySelectorAll('.q'); var done = 0;
    groups.forEach(function(g){ if(g.querySelector('.opt.is-selected')) done++; });
    counter.textContent = '記入 ' + done + ' / ' + groups.length;
    counter.classList.toggle('is-complete', groups.length > 0 && done === groups.length);
  }

  function applyEditable(){
    var on = document.body.classList.contains('editing');
    board.querySelectorAll('.label, .opt, .col-title').forEach(function(el){
      if(on) el.setAttribute('contenteditable','true'); else el.removeAttribute('contenteditable');
    });
  }

  // ===== インデックス算出（DOM位置 → model）=====
  function idxIn(list, el){ return Array.prototype.indexOf.call(list, el); }
  function colIndex(colEl){ return idxIn(board.querySelectorAll('.col'), colEl); }
  function qIndex(colEl, qEl){ return idxIn(colEl.querySelectorAll('.q'), qEl); }

  // ===== 選択トグル（単一選択・再タップ解除）=====
  function toggleOption(opt){
    var group = opt.closest('.q');
    var was = opt.classList.contains('is-selected');
    group.querySelectorAll('.opt').forEach(function(b){
      b.classList.remove('is-selected'); b.setAttribute('aria-pressed','false');
    });
    if(!was){ opt.classList.add('is-selected'); opt.setAttribute('aria-pressed','true'); }
    updateCounter();
  }
  function clearSelections(){
    board.querySelectorAll('.opt.is-selected').forEach(function(b){
      b.classList.remove('is-selected'); b.setAttribute('aria-pressed','false');
    });
  }

  // ===== 構造編集（model を更新 → 再描画 → 保存）=====
  function moveQ(ci, qi, dir){
    var qs = model[ci] && model[ci].qs; if(!qs) return;
    var ni = qi + dir; if(ni < 0 || ni >= qs.length) return;
    var t = qs[qi]; qs[qi] = qs[ni]; qs[ni] = t;
    render(); saveModel();
  }
  function delQ(ci, qi){
    if(!model[ci]) return;
    model[ci].qs.splice(qi, 1);
    render(); saveModel();
  }
  function addQ(ci){
    if(!model[ci]) return;
    model[ci].qs.push({ label:'新しい項目', options:['選択1','選択2'], sev:[0,0] });
    render(); saveModel();
  }
  function addCol(){
    model.push({ title:'新しい列', accent:false, qs:[{ label:'新しい項目', options:['選択1','選択2'], sev:[0,0] }] });
    render(); saveModel();
  }
  function delCol(ci){
    if(!model[ci]) return;
    if(!confirm('この列を削除しますか？（中の項目もすべて消えます）')) return;
    model.splice(ci, 1);
    render(); saveModel();
  }

  // ===== イベント：クリック =====
  board.addEventListener('click', function(e){
    var editing = document.body.classList.contains('editing');
    var t = e.target;
    var colEl = t.closest('.col');
    if(t.closest('.t-up'))  { var q=t.closest('.q'); moveQ(colIndex(colEl), qIndex(colEl,q), -1); return; }
    if(t.closest('.t-down')){ var q=t.closest('.q'); moveQ(colIndex(colEl), qIndex(colEl,q),  1); return; }
    if(t.closest('.t-del')) { var q=t.closest('.q'); delQ(colIndex(colEl), qIndex(colEl,q)); return; }
    if(t.closest('.add-q')) { addQ(colIndex(colEl)); return; }
    if(t.closest('.col-del')){ delCol(colIndex(colEl)); return; }
    if(t.closest('.add-col')){ addCol(); return; }
    var opt = t.closest('.opt');
    if(opt && !editing){ toggleOption(opt); }
  });

  // ===== イベント：キーボード =====
  board.addEventListener('keydown', function(e){
    var el = e.target;
    var isField = el.classList && (el.classList.contains('label') || el.classList.contains('opt') || el.classList.contains('col-title'));
    if(document.body.classList.contains('editing')){
      // §4 編集確定は Enter（改行を入れずフォーカスを外す）
      if(e.key === 'Enter' && isField){ e.preventDefault(); el.blur(); }
      return;
    }
    // 通常モード：Enter / Space で選択トグル（キーボード操作）
    if((e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') && el.classList && el.classList.contains('opt')){
      e.preventDefault(); toggleOption(el);
    }
  });

  // ===== イベント：テキスト編集確定（blur）→ model へ反映 =====
  board.addEventListener('blur', function(e){
    if(!document.body.classList.contains('editing')) return;
    var el = e.target; if(!el.classList) return;
    var text = el.textContent.trim();
    if(el.classList.contains('col-title')){
      var ci = colIndex(el.closest('.col'));
      if(model[ci]) model[ci].title = text;
      saveModel();
    } else if(el.classList.contains('label')){
      var colEl = el.closest('.col'); var ci2 = colIndex(colEl);
      var qi = qIndex(colEl, el.closest('.q'));
      if(model[ci2] && model[ci2].qs[qi]) model[ci2].qs[qi].label = text;
      saveModel();
    } else if(el.classList.contains('opt')){
      var colEl3 = el.closest('.col'); var qEl = el.closest('.q');
      var ci3 = colIndex(colEl3); var qi3 = qIndex(colEl3, qEl);
      var oi = idxIn(qEl.querySelectorAll('.opt'), el.closest('.opt'));
      if(model[ci3] && model[ci3].qs[qi3] && model[ci3].qs[qi3].options[oi] != null){
        model[ci3].qs[qi3].options[oi] = text;
        saveModel();
      }
    }
  }, true);

  // ===== 編集モード切替 =====
  function toggleEdit(){
    var on = !document.body.classList.contains('editing');
    document.body.classList.toggle('editing', on);
    if(on){ clearSelections(); updateCounter(); } // §4 編集突入時は選択クリア
    applyEditable();
    editToggle.textContent = on ? '編集を終了' : '編集';
    editToggle.classList.toggle('is-on', on);
    editToggle.setAttribute('aria-pressed', on ? 'true' : 'false');
    if(!on) saveModel();
  }
  editToggle.addEventListener('click', toggleEdit);

  // ===== リセット（確認あり）=====
  resetBtn.addEventListener('click', function(){
    if(!board.querySelector('.opt.is-selected')) return; // 何も選択がなければ何もしない
    if(!confirm('入力した選択をすべてクリアしますか？')) return;
    clearSelections(); updateCounter();
  });

  // ===== 初期化（確認あり）=====
  initBtn.addEventListener('click', function(){
    if(!confirm('最初の項目に戻しますか？（この端末での編集内容は消えます）')) return;
    try{ localStorage.removeItem(KEY); }catch(e){}
    model = clone(seed);
    render();
  });

  // ===== 書き出し（共有用HTML）=====
  function exportHTML(){
    var doc = document.documentElement.cloneNode(true);
    var b = doc.querySelector('body'); if(b) b.classList.remove('editing');
    doc.querySelectorAll('[contenteditable]').forEach(function(e){ e.removeAttribute('contenteditable'); });
    // 現在の構成（データモデル）を焼き込む（§5-2 / §6-4）
    var baked = doc.querySelector('#bakedModel');
    if(baked) baked.textContent = JSON.stringify({ v:SEED_VERSION, cols:model });
    // 実行時DOMは出力に含めない（開いた側で model から再描画される）
    var bd = doc.querySelector('#board'); if(bd) bd.innerHTML = '';
    // 属性を保持するため outerHTML を使用（<html> 属性の二重化を回避）
    var html = '<!doctype html>\n' + doc.outerHTML;
    try{
      var blob = new Blob([html], {type:'text/html;charset=utf-8'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = '重症喘息シート_共有用.html';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
    }catch(err){
      alert('この画面では書き出しできません。ファイルをダウンロードし、ブラウザ（Safari / Chrome）で開いてからお試しください。');
    }
  }
  saveBtn.addEventListener('click', exportHTML);

  // ===== 起動 =====
  model = loadModel();
  render();
})();
</script>
</body>
</html>
